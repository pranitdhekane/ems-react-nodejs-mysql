services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: ems-backend

    restart: unless-stopped

    env_file:
      - ./backend/.env

    ports:
      - "5001:5001"
    networks:
      - ems-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: ems-frontend

    restart: unless-stopped

    ports:
      - "80:80"

    depends_on:
      backend:
        condition: service_started

    networks:
      - ems-network

networks:
  ems-network:
    driver: bridge
