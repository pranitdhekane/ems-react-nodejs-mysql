apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: ems-app
spec:
  replicas: 4

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        - name: frontend

          image: dpranit/ems-frontend

          ports:
            - containerPort: 80